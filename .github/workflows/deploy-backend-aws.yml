name: CD Backend - AWS Elastic Beanstalk

on:
  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and deploy backend to Elastic Beanstalk
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-2
      EB_APPLICATION_NAME: cinemax-backend
      EB_ENVIRONMENT_NAME: Cinemax-backend-env
      S3_BUCKET: ${{ secrets.EB_S3_BUCKET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Give permission to Maven Wrapper
        run: chmod +x mvnw

      - name: Build backend
        run: ./mvnw clean package -DskipTests

      - name: Prepare Elastic Beanstalk source bundle
        run: |
          mkdir -p deploy
          cp target/*.jar deploy/application.jar
          echo "web: java -jar application.jar" > deploy/Procfile
          cd deploy
          zip -r ../cinemax-backend.zip .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload bundle to S3
        run: |
          VERSION_LABEL="cinemax-${GITHUB_SHA:0:7}-${GITHUB_RUN_NUMBER}"
          S3_KEY="backend/${VERSION_LABEL}.zip"

          echo "VERSION_LABEL=${VERSION_LABEL}" >> $GITHUB_ENV
          echo "S3_KEY=${S3_KEY}" >> $GITHUB_ENV

          aws s3 cp cinemax-backend.zip "s3://${S3_BUCKET}/${S3_KEY}"

      - name: Create Elastic Beanstalk application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "${EB_APPLICATION_NAME}" \
            --version-label "${VERSION_LABEL}" \
            --source-bundle S3Bucket="${S3_BUCKET}",S3Key="${S3_KEY}"

      - name: Deploy version to Elastic Beanstalk
        run: |
          aws elasticbeanstalk update-environment \
            --application-name "${EB_APPLICATION_NAME}" \
            --environment-name "${EB_ENVIRONMENT_NAME}" \
            --version-label "${VERSION_LABEL}"

      - name: Wait for deployment
        run: |
          aws elasticbeanstalk wait environment-updated \
            --environment-names "${EB_ENVIRONMENT_NAME}"