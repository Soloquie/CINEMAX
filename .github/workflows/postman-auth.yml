name: CINEMAX - Pruebas API Autenticación

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

jobs:
  postman-auth:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v5

      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Instalar Newman
        run: npm install -g newman

      - name: Crear carpeta de reportes
        run: mkdir -p reports

      - name: Ejecutar colección Postman de autenticación
        run: |
          newman run "postman/CINEMAX_Autentificacion.postman_collection.json" \
            -e "postman/VAR_CINEMAX.postman_environment.json" \
            -r cli,junit \
            --reporter-junit-export "reports/resultados-autenticacion.xml"

      - name: Subir reporte XML como artefacto
        uses: actions/upload-artifact@v6
        with:
          name: resultados-autenticacion
          path: reports/resultados-autenticacion.xml