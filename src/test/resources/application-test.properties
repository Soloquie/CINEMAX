# Datasource
spring.datasource.url=${SPRING_TEST_DATASOURCE_URL:jdbc:mysql://localhost:3306/cinemax_test}
spring.datasource.username=${SPRING_TEST_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_TEST_DATASOURCE_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=${SPRING_TEST_JPA_DDL_AUTO:create-drop}

# JWT
app.jwt.secret=${APP_JWT_SECRET_TEST:TEST_SECRET_LARGO_DE_MINIMO_32_CARACTERES_123456}
app.jwt.access-expires-in-seconds=900
app.jwt.refresh-expires-in-seconds=604800

app.verification.endpoint=http://localhost:4200/auth/verify-account
app.verification.token-minutes=1440

app.reset-password.endpoint=http://localhost:4200/auth/reset-password
app.reset-password.token-minutes=30

app.cors.allowed-origin=http://localhost:4200

# SendGrid
app.mail.from=test@cinemax.com
sendgrid.api.key=

# Cloudinary
cloudinary.cloud-name=
cloudinary.api-key=
cloudinary.api-secret=
app.cloudinary.folder=cinemax/posters
app.cloudinary.products-folder=cinemax/products

# Seed admin
app.seed.enabled=false
app.seed.admin.email=
app.seed.admin.password=