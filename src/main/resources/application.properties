spring.application.name=CINEMAX

spring.datasource.url=jdbc:mysql://localhost:3306/cinemax_db
spring.datasource.username=root
spring.datasource.password=root

app.jwt.secret=CAMBIA_ESTE_SECRETO_POR_UNO_LARGO_DE_MINIMO_32_CHARS_123456
app.jwt.expires-in-seconds=3600

app.verification.endpoint=http://localhost:4200/auth/verify-account
app.verification.token-minutes=1440

# SendGrid (API HTTPS)
app.mail.from=cinemaxapp0@gmail.com
sendgrid.api.key=${SENDGRID_API_KEY}

app.reset-password.endpoint=http://localhost:4200/auth/reset-password
app.reset-password.token-minutes=30

app.auth.max-failed-attempts=5
app.auth.lock-minutes=15

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
app.cloudinary.folder=cinemax/posters

# Multipart (para subir im·genes)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB