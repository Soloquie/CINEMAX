spring.application.name=CINEMAX

server.port=${PORT:8080}

# Datasource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/cinemax_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:validate}
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${APP_JWT_SECRET:CAMBIA_ESTE_SECRETO_POR_UNO_LARGO_DE_MINIMO_32_CHARS_123456}
app.jwt.expires-in-seconds=${APP_JWT_EXPIRES_IN_SECONDS:3600}

app.verification.endpoint=${APP_VERIFICATION_ENDPOINT:http://localhost:4200/auth/verify-account}
app.verification.token-minutes=${APP_VERIFICATION_TOKEN_MINUTES:1440}

app.reset-password.endpoint=${APP_RESET_PASSWORD_ENDPOINT:http://localhost:4200/auth/reset-password}
app.reset-password.token-minutes=${APP_RESET_PASSWORD_TOKEN_MINUTES:30}

app.cors.allowed-origin=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}

# SendGrid
app.mail.from=${APP_MAIL_FROM:cinemaxapp0@gmail.com}
sendgrid.api.key=${SENDGRID_API_KEY:}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
app.cloudinary.folder=${APP_CLOUDINARY_FOLDER:cinemax/posters}
app.cloudinary.products-folder=${APP_CLOUDINARY_PRODUCT_FOLDER:cinemax/products}

# Multipart
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# Negocio
app.seat-hold.minutes=${APP_SEAT_HOLD_MINUTES:10}

# Seed admin
app.seed.enabled=${APP_SEED_ENABLED:false}
app.seed.admin.email=${APP_SEED_ADMIN_EMAIL:}
app.seed.admin.password=${APP_SEED_ADMIN_PASSWORD:}



