spring.application.name=CINEMAX

spring.datasource.url=jdbc:mysql://localhost:3306/cinemax_db
spring.datasource.username=root
spring.datasource.password=root

app.jwt.secret=CAMBIA_ESTE_SECRETO_POR_UNO_LARGO_DE_MINIMO_32_CHARS_123456
app.jwt.expires-in-seconds=3600

app.verification.endpoint=http://localhost:8080/api/auth/verify-email
